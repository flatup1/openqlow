<meta charset="utf-8">
<!--
  ============================================================
  GIRL POWER! OP メーカー — アニメーションを描くページ
  ============================================================
  このファイルは「時刻 t 秒のときの絵」を 1 枚描くプログラムです。
  パラパラまんがと同じで、これを 1 秒あたり 30 回くりかえして
  写真に撮ると、動画になります(撮影係は render.js)。

  ▼ このファイルの構成(上から順に)
   1. rnd/clamp/lerp/ease… : 計算のべんりな道具
   2. パレット(PINK, YEL…): 使う色のリスト
   3. sunburst/skyBg など   : 背景を描く関数
   4. cardDraw/coverDraw    : キャラ画像を描く関数
   5. heart/star/burst など : ハート・星・紙吹雪のエフェクト
   6. draw(t)               : ★心臓部★ 時刻 t の画面を組み立てる
   7. renderAudio()         : BGM をブラウザの中で作曲して WAV にする

  ▼ カスタマイズポイント
   ・物語の流れ   → story.js を編集(シーンの順番・長さ・文字)★まずはここ
   ・キャラ画像   → chara.png を差しかえる / poses/ にポーズ画像を追加
   ・色           → 「palette」のコメントの下(#ff5fa2 など)
   ・曲のテンポ   → 「60 / 160」の 160(BPM。大きいほど速い)
   ・サイト埋め込み → index.html?loop=1 をブラウザで開くとループ再生
  ============================================================
-->
<style>html,body{margin:0;padding:0;background:#000;overflow:hidden}canvas{display:block;max-width:100%;height:auto;margin:0 auto}</style>
<canvas id="cv" width="1280" height="720"></canvas>
<script src="story.js"></script>
<script>
// 画面サイズは URL で変えられる(例: index.html?w=1080&h=1920 で縦型スマホ動画)
// ?loop=1 を付けてブラウザで開くと、サイト埋め込み用のループ再生になる
const qs = new URLSearchParams(location.search);
const W = +qs.get('w') || 1280, H = +qs.get('h') || 720;
const VERT = H > W; // 縦長レイアウトのときは文字などの置き場所を変える
const cv = document.getElementById('cv');
cv.width = W; cv.height = H;
const cx2d = cv.getContext('2d');
let IMG = new Image(), IW = 0, IH = 0;

// ---------- ポーズ画像(複数枚アニメ) ----------
// poses/ フォルダに置いた画像は、名前でシーンに割り当てられる:
//   idle    … ふだんの構え(カット1・3ほか)
//   punch1  … パンチその1(カット2で punch2 と交互に出る)
//   punch2  … パンチその2
//   jump    … ジャンプ中(カット4・5)
//   win     … 決めポーズ(カット6)
// 見つからない名前は chara.png で代用されるので、1枚だけでも動く。
const POSES = {};
const poseFiles = (qs.get('poses') || '').split(',').filter(Boolean);
function pose(name, fallback) {
  return POSES[name] || (fallback && POSES[fallback]) || IMG;
}

// ---------- deterministic pseudo-random ----------
function rnd(a, b) { // hash two numbers -> [0,1)
  let x = Math.sin(a * 127.1 + b * 311.7) * 43758.5453;
  return x - Math.floor(x);
}
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;

// ---------- palette ----------
const PINK = '#ff5fa2', PINK2 = '#ffb7d5', YEL = '#ffd23f', YEL2 = '#fff3b0',
      SKY = '#7ec8ff', INK = '#221133', WHT = '#ffffff';

// ---------- backgrounds ----------
function sunburst(t, c1, c2, speed) {
  cx2d.fillStyle = c1;
  cx2d.fillRect(0, 0, W, H);
  cx2d.save();
  cx2d.translate(W/2, H/2);
  cx2d.rotate(t * speed);
  cx2d.fillStyle = c2;
  const N = 18;
  for (let i = 0; i < N; i++) {
    const a0 = (i / N) * Math.PI * 2, a1 = a0 + Math.PI / N;
    cx2d.beginPath();
    cx2d.moveTo(0, 0);
    cx2d.arc(0, 0, 1400, a0, a1);
    cx2d.closePath();
    cx2d.fill();
  }
  cx2d.restore();
}
function halftone(alpha) {
  cx2d.save();
  cx2d.globalAlpha = alpha;
  cx2d.fillStyle = WHT;
  for (let y = 20; y < H; y += 46)
    for (let x = 20 + (y % 92 ? 23 : 0); x < W; x += 46) {
      cx2d.beginPath(); cx2d.arc(x, y, 4, 0, 7); cx2d.fill();
    }
  cx2d.restore();
}
function skyBg(t) {
  const g = cx2d.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#8fd0ff'); g.addColorStop(1, '#e8f7ff');
  cx2d.fillStyle = g; cx2d.fillRect(0, 0, W, H);
  // drifting clouds
  cx2d.fillStyle = 'rgba(255,255,255,.9)';
  for (let i = 0; i < 6; i++) {
    const cxp = ((rnd(i, 7) * 1600 + t * (20 + i * 8)) % 1600) - 160;
    const cyp = 60 + rnd(i, 13) * 300;
    const s = 40 + rnd(i, 3) * 40;
    for (let k = 0; k < 4; k++) {
      cx2d.beginPath();
      cx2d.arc(cxp + k * s * .8, cyp + (k % 2) * s * .25, s * (0.7 + 0.3 * rnd(i, k)), 0, 7);
      cx2d.fill();
    }
  }
}

// ---------- image drawing ----------
// full-bleed cover: zoom>=1, (fx,fy) focus point in image fraction coords
function coverDraw(zoom, fx, fy, img) {
  img = img || IMG;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const base = Math.max(W / iw, H / ih) * zoom;
  const dw = iw * base, dh = ih * base;
  let dx = W/2 - fx * dw, dy = H/2 - fy * dh;
  dx = clamp(dx, W - dw, 0); dy = clamp(dy, H - dh, 0);
  cx2d.drawImage(img, dx, dy, dw, dh);
}
// sticker card: character panel with thick white border; (x, yTop) = top center
function cardDraw(x, yTop, scale, rot, sqx, sqy, img) {
  img = img || IMG;
  const h = H * (VERT ? 0.62 : 0.86) * scale, w = h * img.naturalWidth / img.naturalHeight;
  cx2d.save();
  cx2d.translate(x, yTop + h);          // pivot at bottom center for squash/stretch
  cx2d.rotate(rot);
  cx2d.scale(sqx, sqy);
  const r = 26;
  cx2d.shadowColor = 'rgba(30,10,40,.35)';
  cx2d.shadowBlur = 24; cx2d.shadowOffsetY = 10;
  cx2d.fillStyle = WHT;
  cx2d.beginPath();
  cx2d.roundRect(-w/2 - 10, -h - 10, w + 20, h + 20, r + 8);
  cx2d.fill();
  cx2d.shadowColor = 'transparent';
  cx2d.beginPath();
  cx2d.roundRect(-w/2, -h, w, h, r);
  cx2d.clip();
  cx2d.drawImage(img, -w/2, -h, w, h);
  cx2d.restore();
}

// ---------- effects ----------
function heart(x, y, s, color) {
  cx2d.save(); cx2d.translate(x, y); cx2d.scale(s, s);
  cx2d.fillStyle = color;
  cx2d.beginPath();
  cx2d.moveTo(0, .35);
  cx2d.bezierCurveTo(-.9, -.45, -.35, -1.1, 0, -.45);
  cx2d.bezierCurveTo(.35, -1.1, .9, -.45, 0, .35);
  cx2d.fill();
  cx2d.restore();
}
function star(x, y, s, rot, color, stroke) {
  cx2d.save(); cx2d.translate(x, y); cx2d.rotate(rot);
  cx2d.fillStyle = color;
  cx2d.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = i * Math.PI / 5 - Math.PI/2, r = i % 2 ? s * .45 : s;
    cx2d[i ? 'lineTo' : 'moveTo'](Math.cos(a) * r, Math.sin(a) * r);
  }
  cx2d.closePath(); cx2d.fill();
  if (stroke) { cx2d.lineWidth = s * .12; cx2d.strokeStyle = INK; cx2d.stroke(); }
  cx2d.restore();
}
// burst of hearts/stars spawned at ts near (bx,by); life 0.9s
function burst(t, ts, bx, by, kind, seed) {
  const life = (t - ts) / 0.9;
  if (life < 0 || life > 1) return;
  const N = 8;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + rnd(seed, i) * .8;
    const d = easeOut(life) * (90 + rnd(i, seed) * 120);
    const x = bx + Math.cos(a) * d, y = by + Math.sin(a) * d - life * 30;
    const s = (1 - life) * (16 + rnd(seed + 1, i) * 14);
    const col = i % 2 ? PINK : YEL;
    if (kind === 'heart') heart(x, y, s, col);
    else star(x, y, s, a + life * 4, col, false);
  }
  // impact ring
  if (life < .4) {
    cx2d.save();
    cx2d.globalAlpha = 1 - life / .4;
    cx2d.lineWidth = 10 * (1 - life / .4);
    cx2d.strokeStyle = WHT;
    cx2d.beginPath(); cx2d.arc(bx, by, 30 + easeOut(life / .4) * 120, 0, 7); cx2d.stroke();
    cx2d.restore();
  }
}
function speedLines(t, alpha) {
  cx2d.save();
  cx2d.globalAlpha = alpha;
  cx2d.strokeStyle = WHT;
  cx2d.translate(W/2, H/2);
  const N = 44;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + rnd(i, 5) * .2;
    const flick = rnd(i, Math.floor(t * 20)) ;
    if (flick < .35) continue;
    const r0 = 240 + rnd(i, 9) * 140, r1 = Math.hypot(W, H);
    cx2d.lineWidth = 3 + rnd(i, 2) * 9;
    cx2d.beginPath();
    cx2d.moveTo(Math.cos(a) * r0, Math.sin(a) * r0);
    cx2d.lineTo(Math.cos(a) * r1, Math.sin(a) * r1);
    cx2d.stroke();
  }
  cx2d.restore();
}
function confetti(t, t0) {
  const N = 90;
  for (let i = 0; i < N; i++) {
    const delay = rnd(i, 42) * 1.6;
    const life = t - t0 - delay;
    if (life < 0) continue;
    const x = rnd(i, 7) * W + Math.sin(life * (2 + rnd(i, 3) * 3) + i) * 40;
    const y = -20 + life * (140 + rnd(i, 11) * 160);
    if (y > H + 20) continue;
    const cols = [PINK, YEL, SKY, '#9dff70', WHT];
    cx2d.save();
    cx2d.translate(x, y);
    cx2d.rotate(life * (3 + rnd(i, 1) * 5));
    cx2d.fillStyle = cols[i % cols.length];
    cx2d.fillRect(-7, -4, 14, 8);
    cx2d.restore();
  }
}
function starIris(p) { // p: 0 closed(black) -> 1 open
  if (p >= 1) return;
  cx2d.save();
  cx2d.beginPath();
  cx2d.rect(0, 0, W, H);
  const s = Math.max(0.001, easeInOut(p)) * Math.hypot(W, H) * 1.3;
  const cx = W/2, cy = H/2;
  // star hole (even-odd)
  for (let i = 0; i < 10; i++) {
    const a = i * Math.PI / 5 - Math.PI/2, r = i % 2 ? s * .5 : s;
    cx2d[i ? 'lineTo' : 'moveTo'](cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  cx2d.closePath();
  cx2d.fillStyle = INK;
  cx2d.fill('evenodd');
  cx2d.restore();
}
function flash(alpha, color) {
  if (alpha <= 0) return;
  cx2d.save(); cx2d.globalAlpha = clamp(alpha, 0, 1);
  cx2d.fillStyle = color || WHT; cx2d.fillRect(0, 0, W, H);
  cx2d.restore();
}
function vignette() {
  const g = cx2d.createRadialGradient(W/2, H/2, H * .45, W/2, H/2, H * .95);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(40,0,40,.28)');
  cx2d.fillStyle = g; cx2d.fillRect(0, 0, W, H);
}
function popText(txt, x, y, size, fill, t0, t, rot, maxW) {
  const life = t - t0;
  if (life < 0) return;
  const s = life < .35 ? easeOut(life / .35) * 1.25 - .25 * (life / .35) : 1 + Math.sin(t * 6) * .02;
  cx2d.save();
  cx2d.translate(x, y);
  cx2d.rotate(rot || 0);
  cx2d.scale(Math.max(0.001, s), Math.max(0.001, s));
  cx2d.font = `900 ${size}px 'Arial Black', sans-serif`;
  // 長い文字は画面からはみ出さないように自動で縮める
  if (maxW) {
    const tw = cx2d.measureText(txt).width;
    if (tw > maxW) { const f = maxW / tw; cx2d.scale(f, f); }
  }
  cx2d.textAlign = 'center'; cx2d.textBaseline = 'middle';
  cx2d.lineJoin = 'round';
  cx2d.lineWidth = size * .28; cx2d.strokeStyle = INK;
  cx2d.strokeText(txt, 0, 0);
  cx2d.lineWidth = size * .14; cx2d.strokeStyle = WHT;
  cx2d.strokeText(txt, 0, 0);
  cx2d.fillStyle = fill;
  cx2d.fillText(txt, 0, 0);
  cx2d.restore();
}

// ---------- 物語(シナリオ) ----------
// story.js の window.STORY がシーンの並びを決める。無ければ下の既定の物語。
const BEAT = 60 / 160; // 160 bpm
const DEFAULT_STORY = [
  { type: 'entrance', sec: 4.5, text: 'HERE SHE COMES!' },
  { type: 'punch',    sec: 4.5, text: 'POW!' },
  { type: 'closeup',  sec: 4.5, text: 'FIGHT!' },
  { type: 'jump',     sec: 4.5, text: 'JUMP!' },
  { type: 'sky',      sec: 4.5, text: 'SO STRONG!' },
  { type: 'finale',   sec: 7.5, title: 'GIRL POWER!', subtitle: 'KICKBOXING GIRL' },
];
const STORY = (window.STORY && window.STORY.length) ? window.STORY : DEFAULT_STORY;
{ let acc = 0; for (const s of STORY) { s.start = acc; acc += s.sec; } }
const DUR = STORY[STORY.length - 1].start + STORY[STORY.length - 1].sec;
window.DUR = DUR;
function sceneAt(time) {
  let sc = STORY[STORY.length - 1];
  for (const s of STORY) if (time < s.start + s.sec) { sc = s; break; }
  return sc;
}
// 静かなシーン(BGMがドラム無しのやさしい曲に切りかわる)
const QUIET = new Set(['night', 'fall', 'smallpunch', 'sunrise', 'cta', 'help']);

// ---------- シーンの種類(テンプレート) ----------
// それぞれ「そのシーンの絵の作り方」。引数は
//   t  = 動画全体の時刻(秒) / lt = シーン内の時刻 / p = シーンの進み具合 0〜1 / sc = story.js の1行
const SCENES = {

  // 登場: ズームインしながらキャラが現れる
  entrance(t, lt, p, sc) {
    sunburst(t, sc.c1 || PINK, sc.c2 || PINK2, .35);
    halftone(.35);
    const e = easeOut(clamp(p * 1.6, 0, 1));
    cardDraw(W/2, H * (VERT ? .14 : .07) + (1 - e) * -260, lerp(.55, 1, e), Math.sin(t * 2) * .015, 1, 1, pose('idle'));
    const txt = sc.text !== undefined ? sc.text : 'HERE SHE COMES!';
    if (txt && p > .45) {
      const i = txt.lastIndexOf(' ');
      const l1 = i > 0 ? txt.slice(0, i) : txt, l2 = i > 0 ? txt.slice(i + 1) : '';
      popText(l1, VERT ? W/2 : W * .19, VERT ? H * .05 : H * .30, 52, YEL, sc.start + sc.sec * .45, t, -.06, VERT ? W * .9 : W * .34);
      if (l2) popText(l2, VERT ? W/2 : W * .21, VERT ? H * .105 : H * .42, 52, YEL, sc.start + sc.sec * .5, t, -.06, VERT ? W * .9 : W * .34);
    }
  },

  // パンチ連打: ビートに合わせてポーズが切りかわり、ハートが飛び散る
  punch(t, lt, p, sc) {
    sunburst(t, sc.c1 || YEL, sc.c2 || YEL2, -.5);
    halftone(.3);
    const hits = [];
    for (let h = BEAT; h < sc.sec - .3; h += BEAT * 2) hits.push(sc.start + h);
    let shx = 0, shy = 0, sq = 0, lastHit = -1, lastIdx = 0;
    for (let i = 0; i < hits.length; i++) if (hits[i] <= t) { lastHit = hits[i]; lastIdx = i; }
    if (lastHit >= 0) {
      const k = clamp((t - lastHit) / .22, 0, 1);
      const dir = lastIdx % 2 ? 1 : -1;
      shx = dir * (1 - k) * 34; shy = (1 - k) * -14; sq = (1 - k) * .06;
    }
    // ヒットから0.35秒間はパンチのポーズ画像に切りかわる(左右交互)
    const punching = lastHit >= 0 && t - lastHit < .35;
    const img2 = punching ? pose(lastIdx % 2 ? 'punch2' : 'punch1', 'punch1') : pose('idle');
    cardDraw(W/2 + shx, H * (VERT ? .14 : .07) + shy, 1, shx * .0012, 1 + sq, 1 - sq, img2);
    const cry = sc.text !== undefined ? sc.text : 'POW!';
    for (let i = 0; i < hits.length; i++) {
      const dir = i % 2 ? 1 : -1;
      burst(t, hits[i], W/2 + dir * (VERT ? 330 : 300), H * .34 + rnd(i, 6) * 60, 'heart', i);
      if (cry && i % 2 === 0) {
        const life = t - hits[i];
        if (life > 0 && life < .5) popText(cry, W/2 + dir * (VERT ? 250 : 380), H * (VERT ? .08 : .2), 64, PINK, hits[i], t, dir * .12, W * .3);
      }
    }
    flash(lastHit >= 0 ? .5 - (t - lastHit) * 3 : 0, WHT);
  },

  // クローズアップ: 顔にゆっくり寄る+集中線
  closeup(t, lt, p, sc) {
    coverDraw(lerp(1.0, 1.22, easeInOut(p)), .5, lerp(.42, .36, p), pose('idle'));
    speedLines(t, .8);
    cx2d.save();
    cx2d.globalCompositeOperation = 'overlay';
    cx2d.fillStyle = 'rgba(255,210,63,.18)';
    cx2d.fillRect(0, 0, W, H);
    cx2d.restore();
    const txt = sc.text !== undefined ? sc.text : 'FIGHT!';
    if (txt) popText(txt, W * .5, H * .84, 92, YEL, sc.start + .5, t, -.05, W * .9);
    vignette();
  },

  // ジャンプ: ぴょんぴょん跳ねる(つぶれ・のび付き)
  jump(t, lt, p, sc) {
    sunburst(t, sc.c1 || '#a06bff', sc.c2 || '#c9a6ff', .9);
    halftone(.28);
    const hops = [];
    for (let h = .4; h < sc.sec - .8; h += 1.3) hops.push(sc.start + h);
    let jy = 0, sqx = 1, sqy = 1;
    for (const h0 of hops) {
      const k = (t - h0) / .75;
      if (k >= 0 && k <= 1) {
        jy = -Math.sin(k * Math.PI) * 140;
        if (k < .12) { sqx = 1.12; sqy = .86; }            // しゃがみ
        else if (k < .5) { sqx = .92; sqy = 1.10; }         // のび
        else if (k > .88) { sqx = 1.14; sqy = .84; }        // 着地でつぶれ
      }
    }
    // 空中にいる間はジャンプのポーズ画像に切りかわる
    cardDraw(W/2, H * (VERT ? .18 : .12) + jy, .84, Math.sin(t * 3) * .02, sqx, sqy,
             jy < -8 ? pose('jump', 'idle') : pose('idle'));
    for (let i = 0; i < hops.length; i++)
      burst(t, hops[i] + .72, W/2, H * .9, 'star', i + 20);
    const txt = sc.text !== undefined ? sc.text : 'JUMP!';
    if (txt) popText(txt, W * .82, H * .25, 66, SKY, sc.start + .5, t, .1, W * .3);
  },

  // 空: 青空をふわふわ飛ぶ
  sky(t, lt, p, sc) {
    skyBg(t);
    const rise = lerp(H * .16, H * .02, easeInOut(p));
    cardDraw(W/2, rise + Math.sin(t * 1.8) * 12, .92, Math.sin(t * 1.2) * .04, 1, 1, pose('jump', 'idle'));
    for (let i = 0; i < 16; i++) {
      const life = (lt * (.25 + rnd(i, 8) * .3) + rnd(i, 4)) % 1;
      const x = rnd(i, 2) * W;
      const y = H - life * (H + 80);
      const s = 10 + rnd(i, 5) * 18;
      cx2d.save(); cx2d.globalAlpha = clamp(Math.sin(life * Math.PI) * 1.4, 0, 1);
      if (i % 2) heart(x, y, s, PINK); else star(x, y, s, life * 3, YEL, false);
      cx2d.restore();
    }
    const txt = sc.text !== undefined ? sc.text : 'SO STRONG!';
    if (txt) popText(txt, VERT ? W/2 : W * .21, VERT ? H * .88 : H * .40, 54, WHT, sc.start + .6, t, -.06, VERT ? W * .9 : W * .34);
  },

  // フィナーレ: 紙吹雪+ロゴ
  finale(t, lt, p, sc) {
    sunburst(t, sc.c1 || PINK, sc.c2 || YEL, .25);
    halftone(.3);
    cardDraw(W * (VERT ? .5 : .28), H * (VERT ? .05 : .08), (VERT ? .82 : .92) + Math.min(p * .1, .05), 0, 1, 1, pose('win', 'idle'));
    star(W * (VERT ? .12 : .08), H * .85, 55 + Math.sin(t * 4) * 6, t, YEL, true);
    star(W * (VERT ? .88 : .56), H * (VERT ? .82 : .78), 46 + Math.cos(t * 4) * 6, -t, PINK2, true);
    confetti(t, sc.start);
    const title = sc.title !== undefined ? sc.title : 'GIRL POWER!';
    const sub = sc.subtitle !== undefined ? sc.subtitle : 'KICKBOXING GIRL';
    if (title) popText(title, W * (VERT ? .5 : .70), H * (VERT ? .68 : .32), 88, PINK, sc.start + .35, t, -.03, VERT ? W * .92 : W * .54);
    if (sub) popText(sub, W * (VERT ? .5 : .70), H * (VERT ? .77 : .48), 40, YEL, sc.start + .8, t, 0, VERT ? W * .92 : W * .54);
  },

  // 夜: 月明かりの静かなジム(物語の始まりに)
  night(t, lt, p, sc) {
    const g = cx2d.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#12172e'); g.addColorStop(1, '#2a3154');
    cx2d.fillStyle = g; cx2d.fillRect(0, 0, W, H);
    // 星(またたき)
    for (let i = 0; i < 40; i++) {
      cx2d.save();
      cx2d.globalAlpha = clamp(.3 + Math.sin(t * 2 + i * 1.7) * .4, 0, 1) * .8;
      cx2d.fillStyle = WHT;
      cx2d.beginPath();
      cx2d.arc(rnd(i, 3) * W, rnd(i, 9) * H * .55, 1.5 + rnd(i, 5) * 2, 0, 7);
      cx2d.fill();
      cx2d.restore();
    }
    // 月
    cx2d.save();
    cx2d.shadowColor = '#fff7d6'; cx2d.shadowBlur = 60;
    cx2d.fillStyle = '#fff7d6';
    cx2d.beginPath(); cx2d.arc(W * .82, H * .18, Math.min(W, H) * .07, 0, 7); cx2d.fill();
    cx2d.restore();
    // キャラは小さめ・ゆっくり揺れる(眠りから覚める感じ)
    const wake = easeOut(clamp(p * 1.4, 0, 1));
    cardDraw(W/2, H * (VERT ? .22 : .16), .62 + wake * .08, Math.sin(t * .8) * .03, 1, 1 + Math.sin(t * 2) * .012, pose(sc.pose || 'idle'));
    // 夜のとばり(全体を少し暗く)
    flash(.18, '#101530');
    const txt = sc.text !== undefined ? sc.text : '';
    if (txt) popText(txt, W/2, H * (VERT ? .88 : .87), 44, WHT, sc.start + .6, t, 0, W * .9);
  },

  // 転ぶ: 空振りしてぽてっと転ぶ(やさしい笑い)
  fall(t, lt, p, sc) {
    sunburst(t, sc.c1 || '#ffe3ef', sc.c2 || '#fff6fa', .15);
    halftone(.18);
    const ch = H * (VERT ? .62 : .86) * .9;
    const yTop = H * (VERT ? .16 : .09);
    const rot = 1.25 * easeOut(clamp(lt / .8, 0, 1)) + Math.sin(t * 3) * .015 * (1 - p);
    cardDraw(W/2, yTop, .9, rot, 1, 1, pose(sc.pose || 'fall', 'idle'));
    // 転んだあと、頭のまわりに星がくるくる回る
    if (lt > .8) {
      const d = ch * .85;
      const hx = W/2 + Math.sin(rot) * d, hy = yTop + ch - Math.cos(rot) * d;
      for (let i = 0; i < 3; i++) {
        const ang = t * 3 + i * 2.1;
        star(hx + Math.cos(ang) * 70, hy + Math.sin(ang) * 26 - 24, 13, ang, YEL, false);
      }
    }
    const txt = sc.text !== undefined ? sc.text : 'おっとっと!';
    if (txt) popText(txt, W * (VERT ? .5 : .8), H * (VERT ? .07 : .2), 56, PINK, sc.start + .85, t, .08, W * .38);
  },

  // 小さな一発: 派手じゃない、はじめてのパンチ
  smallpunch(t, lt, p, sc) {
    const g = cx2d.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#fff2df'); g.addColorStop(1, '#ffe0ea');
    cx2d.fillStyle = g; cx2d.fillRect(0, 0, W, H);
    halftone(.14);
    const hitAt = sc.start + sc.sec * .55;          // シーンの半分すぎに1発だけ
    const after = t - hitAt;
    const punching = after > 0 && after < .45;
    const k = punching ? 1 - clamp(after / .3, 0, 1) : 0;
    // 打つ前は深呼吸(ゆっくり上下)
    cardDraw(W/2 + k * 18, H * (VERT ? .14 : .07) + k * -8, .96, k * .01, 1 + k * .03,
             1 - k * .03 + Math.sin(t * 1.6) * .012, punching ? pose('punch1', 'idle') : pose(sc.pose || 'idle'));
    if (after > 0) burst(t, hitAt, W/2 + (VERT ? 300 : 280), H * .36, 'heart', 7);
    flash(after > 0 ? .25 - after * 1.2 : 0, WHT);
    const txt = sc.text !== undefined ? sc.text : 'できた!';
    if (txt && after > .2) popText(txt, W * (VERT ? .5 : .8), H * (VERT ? .07 : .2), 56, PINK, hitAt + .2, t, -.06, W * .38);
  },

  // 朝日: 夜が明けて、あたたかい朝が来る
  sunrise(t, lt, p, sc) {
    // 夜明けの紫 → あたたかいオレンジへ、だんだん変わる
    const g1 = cx2d.createLinearGradient(0, 0, 0, H);
    g1.addColorStop(0, '#3b3266'); g1.addColorStop(1, '#8a5a7a');
    cx2d.fillStyle = g1; cx2d.fillRect(0, 0, W, H);
    cx2d.save();
    cx2d.globalAlpha = easeInOut(p);
    const g2 = cx2d.createLinearGradient(0, 0, 0, H);
    g2.addColorStop(0, '#ffd9a0'); g2.addColorStop(1, '#ffb3c8');
    cx2d.fillStyle = g2; cx2d.fillRect(0, 0, W, H);
    cx2d.restore();
    // のぼる太陽
    const sy = H * (1.02 - easeInOut(p) * .38);
    cx2d.save();
    cx2d.shadowColor = '#fff1b8'; cx2d.shadowBlur = 80;
    cx2d.fillStyle = '#fff1b8';
    cx2d.beginPath(); cx2d.arc(W/2, sy, Math.min(W, H) * .12, 0, 7); cx2d.fill();
    cx2d.restore();
    cardDraw(W/2, H * (VERT ? .16 : .09) + Math.sin(t * 1.4) * 8, .9, Math.sin(t * 1.1) * .02, 1, 1, pose(sc.pose || 'win', 'idle'));
    const txt = sc.text !== undefined ? sc.text : '';
    if (txt) popText(txt, W/2, H * (VERT ? .9 : .88), 46, WHT, sc.start + .5, t, 0, W * .9);
  },

  // CTA: 最後のメッセージ+ボタン(サイト用の締め)
  cta(t, lt, p, sc) {
    sunburst(t, sc.c1 || PINK, sc.c2 || YEL, .12);
    halftone(.2);
    cardDraw(W * (VERT ? .5 : .24), H * (VERT ? .04 : .12), VERT ? .5 : .8, Math.sin(t * 1.2) * .015, 1, 1, pose(sc.pose || 'win', 'idle'));
    const tx = W * (VERT ? .5 : .66);
    const title = sc.title !== undefined ? sc.title : '怖くても、大丈夫。';
    const sub = sc.subtitle !== undefined ? sc.subtitle : '';
    if (title) popText(title, tx, H * (VERT ? .42 : .3), 72, WHT, sc.start + .3, t, 0, VERT ? W * .92 : W * .6);
    if (sub) popText(sub, tx, H * (VERT ? .52 : .45), 36, YEL, sc.start + .7, t, 0, VERT ? W * .92 : W * .6);
    // ボタン(ぽよんと登場して、やさしく脈打つ)
    const btn = sc.button !== undefined ? sc.button : '500円体験を予約する';
    if (btn) {
      const bl = t - (sc.start + 1.1);
      if (bl > 0) {
        const scale = (bl < .35 ? easeOut(bl / .35) * 1.15 - .15 * (bl / .35) : 1 + Math.sin(t * 3) * .03);
        cx2d.save();
        cx2d.translate(tx, H * (VERT ? .66 : .62));
        cx2d.scale(scale, scale);
        cx2d.font = `900 34px 'Arial Black', sans-serif`;
        const bw = Math.min(cx2d.measureText(btn).width + 90, W * .8);
        cx2d.shadowColor = 'rgba(30,10,40,.3)'; cx2d.shadowBlur = 18; cx2d.shadowOffsetY = 6;
        cx2d.fillStyle = PINK;
        cx2d.beginPath(); cx2d.roundRect(-bw/2, -38, bw, 76, 38); cx2d.fill();
        cx2d.shadowColor = 'transparent';
        cx2d.lineWidth = 5; cx2d.strokeStyle = WHT; cx2d.stroke();
        cx2d.fillStyle = WHT;
        cx2d.textAlign = 'center'; cx2d.textBaseline = 'middle';
        if (cx2d.measureText(btn).width > bw - 60) {
          const f = (bw - 60) / cx2d.measureText(btn).width;
          cx2d.scale(f, f);
        }
        cx2d.fillText(btn, 0, 2);
        cx2d.restore();
      }
    }
  },

  // 優しさの継承(Bible §11/§15): 主人公が、入口で緊張する新入りの隣に寄り、手を差し伸べる。
  // 急かさない・笑わない。二人の間にそっとハートが昇る。BGMはしずか系。
  help(t, lt, p, sc) {
    // あたたかい朝の光(やわらかい放射)
    const g = cx2d.createRadialGradient(W/2, H * .35, 40, W/2, H * .35, Math.hypot(W, H) * .7);
    g.addColorStop(0, '#fff3df'); g.addColorStop(1, '#ffdca8');
    cx2d.fillStyle = g; cx2d.fillRect(0, 0, W, H);
    halftone(.12);

    // レイアウト: 横=左に主人公・右に新入り / 縦=下に主人公・上に新入り
    const heroX = VERT ? W * .34 : W * .30;
    const newX = VERT ? W * .66 : W * .66;
    const heroY = H * (VERT ? .30 : .12);
    const newY = H * (VERT ? .22 : .24);

    // 新入り(小さく・少し透けて・こわごわ揺れる)。同じキャラを nervous 指定、無ければ idle。
    cx2d.save();
    cx2d.globalAlpha = 0.9;
    cardDraw(newX, newY + Math.sin(t * 2.2) * 4, VERT ? .42 : .52, Math.sin(t * 2.2) * .03, 1, 1, pose('nervous', 'idle'));
    cx2d.restore();

    // 主人公(新入りの方へそっと傾く)。手を差し伸べる=わずかに寄る動き。
    const lean = easeInOut(clamp(p * 1.3, 0, 1)) * (VERT ? 0 : W * .03);
    cardDraw(heroX + lean, heroY, VERT ? .5 : .62, (VERT ? 0.04 : 0.06) * easeInOut(clamp(p * 1.3, 0, 1)), 1, 1, pose('win', 'idle'));

    // 二人の間に、そっと昇るハート(急がない優しさ)
    const midX = (heroX + newX) / 2, midY = (heroY + newY) / 2;
    for (let i = 0; i < 4; i++) {
      const life = ((t - sc.start) * .35 + i * .25) % 1;
      cx2d.save();
      cx2d.globalAlpha = clamp(Math.sin(life * Math.PI), 0, 1) * .9;
      heart(midX + Math.sin(life * 6 + i) * 22, midY - life * 90, 12 + i * 2, PINK);
      cx2d.restore();
    }

    // セリフは短く(§17 の「使う言葉」)。既定は「ぼくも、最初は怖かったよ。」
    const txt = sc.text !== undefined ? sc.text : 'ぼくも、最初は怖かったよ。';
    if (txt) popText(txt, W / 2, H * (VERT ? .9 : .86), 44, INK, sc.start + .6, t, 0, W * .9);
  },
};

function draw(t) {
  cx2d.clearRect(0, 0, W, H);
  const sc = sceneAt(t);
  const lt = Math.max(0, t - sc.start);
  const p = clamp(lt / sc.sec, 0, 1);
  (SCENES[sc.type] || SCENES.entrance)(t, lt, p, sc);
  // シーン切りかえの白フラッシュ
  for (const s of STORY) {
    if (!s.start) continue;
    const d = Math.abs(t - s.start);
    if (d < .14) flash(1 - d / .14, WHT);
  }
  // 動画の最初は星形の穴が開いて始まる
  starIris(t / 1.1);
  // 最後はゆっくり暗転
  if (t > DUR - .8) flash((t - (DUR - .8)) / .8, INK);
}

window.seek = t => { draw(t); return true; };

// ---------- BGM: original 160bpm chiptune, rendered offline ----------
async function renderAudio() {
  const sr = 44100;
  const ctx = new OfflineAudioContext(2, sr * DUR, sr);
  const master = ctx.createGain(); master.gain.value = .82; master.connect(ctx.destination);
  const comp = ctx.createDynamicsCompressor(); comp.connect(master);

  const N = (f) => { // noise buffer
    const b = ctx.createBuffer(1, sr * .3, sr), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * f));
    return b;
  };
  const snareBuf = N(.02), hatBuf = N(.005), crashBuf = N(.12);

  function kick(t0) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.setValueAtTime(150, t0);
    o.frequency.exponentialRampToValueAtTime(42, t0 + .12);
    g.gain.setValueAtTime(.9, t0);
    g.gain.exponentialRampToValueAtTime(.001, t0 + .18);
    o.connect(g); g.connect(comp); o.start(t0); o.stop(t0 + .2);
  }
  function noiseHit(buf, t0, vol, hp) {
    const s = ctx.createBufferSource(); s.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
    const g = ctx.createGain(); g.gain.value = vol;
    s.connect(f); f.connect(g); g.connect(comp); s.start(t0);
  }
  function tone(type, freq, t0, dur, vol, pan) {
    const o = ctx.createOscillator(); o.type = type; o.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + .015);
    g.gain.setValueAtTime(vol, t0 + dur * .6);
    g.gain.exponentialRampToValueAtTime(.001, t0 + dur);
    const p = ctx.createStereoPanner(); p.pan.value = pan || 0;
    o.connect(g); g.connect(p); p.connect(comp);
    o.start(t0); o.stop(t0 + dur + .02);
  }
  const NOTE = n => 440 * Math.pow(2, (n - 69) / 12); // midi -> Hz

  // chord roots per bar (4 beats each): C  G  A  F  (I V vi IV)
  const roots = [48, 55, 57, 53]; // C3 G3 A3 F3
  const bars = Math.floor(DUR / (BEAT * 4));
  // original lead riff: scale degrees over the bar (pentatonic-ish), per 2-bar phrase
  const riffA = [12, 16, 19, 16, 21, 19, 16, 14];
  const riffB = [12, 14, 16, 19, 16, 14, 12, 9];

  for (let bar = 0; bar < bars; bar++) {
    const bt = bar * BEAT * 4;
    const root = roots[bar % 4];
    // 静かなシーンではドラムを止めて、オルゴール風のやさしい伴奏に
    if (QUIET.has(sceneAt(bt).type)) {
      tone('sine', NOTE(root - 12), bt, BEAT * 3.6, .09, 0);
      const chord = [0, 4, 7, 12];
      for (let b = 0; b < 4; b++)
        tone('triangle', NOTE(root + 12 + chord[b]), bt + b * BEAT, BEAT * 1.5, .06, (b % 2) ? .3 : -.3);
      continue;
    }
    for (let b = 0; b < 4; b++) {
      const t0 = bt + b * BEAT;
      kick(t0);
      if (b % 2 === 1) noiseHit(snareBuf, t0, .5, 1800);
      noiseHit(hatBuf, t0, .18, 6000);
      noiseHit(hatBuf, t0 + BEAT / 2, .12, 7000);
      // bass: root 8ths with octave pop
      tone('square', NOTE(root - 12), t0, BEAT * .45, .16, 0);
      tone('square', NOTE(b === 3 ? root : root - 12), t0 + BEAT / 2, BEAT * .4, .13, 0);
    }
    // lead melody (skip intro bar 0 and let finale ring)
    if (bar >= 1 && bt < DUR - 2) {
      const riff = (bar % 2) ? riffB : riffA;
      for (let s = 0; s < 8; s++) {
        const t0 = bt + s * BEAT / 2;
        const semis = riff[s];
        tone('square', NOTE(root + 12 + semis), t0, BEAT * .42, .10, -.25);
        tone('triangle', NOTE(root + 24 + semis), t0, BEAT * .38, .07, .25);
      }
    }
    // sky(空)のシーンではキラキラのアルペジオを重ねる
    if (sceneAt(bt).type === 'sky') {
      for (let s = 0; s < 8; s++)
        tone('sine', NOTE(root + 36 + [0, 4, 7, 12][s % 4]), bt + s * BEAT / 2, BEAT * .3, .05, (s % 2) ? .5 : -.5);
    }
  }
  // シーンの切りかわりでシンバル(静かなシーンへはチリンという鈴に)
  for (const s of STORY) if (s.start > 0) {
    if (QUIET.has(s.type)) tone('sine', NOTE(96), s.start, .8, .08, 0);
    else noiseHit(crashBuf, s.start, .5, 900);
  }
  const fin = STORY.filter(s => s.type === 'finale').pop();
  if (fin) for (const semis of [0, 4, 7, 12]) tone('sawtooth', NOTE(60 + semis), fin.start + .35, 2.2, .07, 0);
  kick(DUR - .4);

  const buf = await ctx.startRendering();
  // encode 16-bit stereo WAV
  const len = buf.length, ch0 = buf.getChannelData(0), ch1 = buf.getChannelData(1);
  const bytes = 44 + len * 4;
  const ab = new ArrayBuffer(bytes), v = new DataView(ab);
  const wstr = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  wstr(0, 'RIFF'); v.setUint32(4, bytes - 8, true); wstr(8, 'WAVE');
  wstr(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 2, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 4, true); v.setUint16(32, 4, true); v.setUint16(34, 16, true);
  wstr(36, 'data'); v.setUint32(40, len * 4, true);
  let o = 44;
  for (let i = 0; i < len; i++) {
    v.setInt16(o, clamp(ch0[i], -1, 1) * 32767, true); o += 2;
    v.setInt16(o, clamp(ch1[i], -1, 1) * 32767, true); o += 2;
  }
  // base64
  const u8 = new Uint8Array(ab);
  let s = '';
  for (let i = 0; i < u8.length; i += 32768)
    s += String.fromCharCode.apply(null, u8.subarray(i, i + 32768));
  return btoa(s);
}
window.renderAudio = renderAudio;

// chara.png と poses/ の画像をぜんぶ読み込めたらスタート
const loadImg = src => new Promise((ok, ng) => {
  const im = new Image();
  im.onload = () => ok(im);
  im.onerror = () => ng(new Error('画像が読み込めません: ' + src));
  im.src = src;
});
(async () => {
  IMG = await loadImg('chara.png');
  IW = IMG.naturalWidth; IH = IMG.naturalHeight;
  for (const f of poseFiles) {
    const name = f.replace(/\.[^.]+$/, '');     // 拡張子を取った名前がポーズ名
    POSES[name] = await loadImg('poses/' + f);
  }
  window.ready = true;
  if (qs.get('loop')) {
    // ★サイト埋め込みモード: リアルタイムでずっとループ再生
    const t0 = performance.now();
    (function anim() { draw(((performance.now() - t0) / 1000) % DUR); requestAnimationFrame(anim); })();
    // クリックされたら音楽も鳴らす(ブラウザの自動再生ルールがあるため、最初は無音)
    let actx = null;
    cv.addEventListener('click', async () => {
      if (actx) return;
      actx = new AudioContext();
      const b64 = await renderAudio();
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const abuf = await actx.decodeAudioData(bytes.buffer);
      const srcN = actx.createBufferSource();
      srcN.buffer = abuf; srcN.loop = true;
      srcN.connect(actx.destination);
      srcN.start(0, ((performance.now() - t0) / 1000) % DUR);  // 映像の位置に合わせて再生
    });
  } else {
    draw(0);
  }
})();
</script>
