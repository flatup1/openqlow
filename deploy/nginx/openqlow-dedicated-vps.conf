# NOTE: limit_req_zone must live in the http{} context (this file is a
# server{} snippet included from the main nginx.conf). Add this line once,
# alongside other limit_req_zone directives in http{}:
#   limit_req_zone $binary_remote_addr zone=openqlow_webhook:10m rate=30r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 1m;

    location = /openqlow/health {
        default_type text/plain;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        return 200 "openqlow ok\n";
    }

    location = /openqlow/webhook {
        limit_req zone=openqlow_webhook burst=10 nodelay;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        proxy_pass http://127.0.0.1:8787/openqlow/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Line-Signature $http_x_line_signature;
    }

    location / {
        default_type text/plain;
        return 200 "OPENQLOW dedicated VPS\n";
    }
}
