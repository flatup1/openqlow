# Nginx snippet for one VPS hosting both the existing FLATUP LINE Bot and OPENQLOW.
# Replace server_name and TLS config with the VPS/domain's existing settings.
#
# Existing BOT remains isolated:
#   /line/webhook      -> http://127.0.0.1:8000
# OPENQLOW uses its own path and port:
#   /openqlow/webhook  -> http://127.0.0.1:8787

# NOTE: limit_req_zone must live in the http{} context (this file is a
# server{} snippet included from the main nginx.conf). Add this line once,
# alongside other limit_req_zone directives in http{}:
#   limit_req_zone $binary_remote_addr zone=openqlow_webhook:10m rate=30r/m;

server {
    listen 80;
    server_name example.com;

    # Existing FLATUP customer-facing LINE Bot.
    # Keep this pointed at the existing service/port.
    location = /line/webhook {
        proxy_pass http://127.0.0.1:8000/line/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OPENQLOW approval-only LINE account.
    location = /openqlow/webhook {
        limit_req zone=openqlow_webhook burst=10 nodelay;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        proxy_pass http://127.0.0.1:8787/openqlow/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openqlow/health {
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        return 200 "openqlow nginx route ok\n";
        add_header Content-Type text/plain;
    }
}
